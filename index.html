<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="build-id" content="__BUILD_ID__" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <title>Megha Maanay Homes - Apartment Portal</title>
    <meta name="description" content="Official resident and management portal for Megha Maanay Homes. Track maintenance payments, flat vacancy, and raise service requests." />
    <script>
      // GitHub Pages SPA redirect handler.
      // When 404.html redirects here with ?p=/original/path, we restore the
      // real URL using history.replaceState so React Router sees the correct path.
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        var h = params.get('h');
        if (p) {
          window.history.replaceState(
            null, null,
            p + (h ? h : '')
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
